<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Cartão</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex">
    <div id="menu"></div>

    <main class="flex-1 ml-20 p-6">
        <div class="max-w-4xl mx-auto p-8">
            <h1 class="page-title">Cadastrar Novo Cartão</h1>
            <form id="formNovoCartao" name="formNovoCartao" method="post" action="" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Apelido do Cartão -->
                    <div>
                        <label for="apelidoCartao" class="label-estgar">Apelido do
                            Cartão</label>
                        <input type="text" id="apelidoCartao" name="apelidoCartao" placeholder="Ex: Cartão de Crédito"
                            required class="input-estgar">
                    </div>
                    <!-- Bandeira do Cartão -->
                    <div>
                        <label for="bandeira" class="label-estgar">Bandeira</label>
                        <select id="bandeira" name="bandeira" required class="input-estgar">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="mastercad">Mastercard</option>
                            <option value="visa">Visa</option>
                            <option value="elo">Elo</option>
                        </select>
                    </div>
                </div>

                <!-- Vencimento e Limite -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Vencimento do Cartão -->
                    <div>
                        <label for="vencimentoCartao" class="label-estgar">Vencimento
                            do Cartão</label>
                        <input type="text" id="vencimentoCartao" name="vencimentoCartao" placeholder="MM/AA" required
                            class="input-estgar">
                    </div>
                    <!-- Limite de crédito -->
                    <div>
                        <label for="limiteCredito" class="label-estgar">Limite de
                            Crédito</label>
                        <input type="text" id="limiteCredito" name="limiteCredito" placeholder="R$ 0,00" required
                            class="input-estgar">
                    </div>
                </div>

                <!--Melhor Dia e Vencimento da Fatura-->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Melhor dia de Compra -->
                    <div>
                        <label for="melhorDiaCompra" class="label-estgar">Melhor dia
                            de Compra</label>
                        <input type="number" id="melhorDiaCompra" name="melhorDiaCompra" placeholder="00" required
                            min="1" max="31" class="input-estgar">
                    </div>

                    <!-- Dia de Vencimento da Fatura -->
                    <div>
                        <label for="diaVencimentoFatura" class="label-estgar">Dia de
                            Vencimento da
                            Fatura</label>
                        <input type="number" id="diaVencimentoFatura" name="diaVencimentoFatura" placeholder="00"
                            required min="1" max="31" class="input-estgar">
                    </div>
                </div>
                <!-- Ativar como cartão principal -->
                <div
                    class="bg-estgar-bege-escuro p-3 rounded-xl border border-gray-400 flex items-center justify-between mt-4">
                    <div>
                        <label for="cartaoPrincipal" class="block text-base font-bold text-slate-800">Ativar como Cartão
                            Principal</label>
                        <span class="text-sm text-slate-500 mt-1 block">Definir este cartão como principal para
                            gastos?</span>
                    </div>
                    <div>
                        <input type="checkbox" id="cartaoPrincipal" name="cartaoPrincipal"
                            class="w-6 h-6 accent-estgar-roxo cursor-pointer">
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex flex-col-reverse md:flex-row justify-end gap-4 mt-8">
                    <button type="button" id="btnCancelar" name="btnCancelar"
                        class="cursor-pointer w-full md:w-auto px-6 py-3 font-semibold text-slate-600 hover:shadow-lg border border-estgar-roxo hover:border-gray-400 rounded-xl transition-all ">Cancelar
                    </button>
                    <button type="submit" id="btnSalvar" name="btnSalvar"
                        class="cursor-pointer w-full md:w-auto px-10 py-3 bg-estgar-verde-escuro text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all">Salvar
                    </button>

                </div>
            </form>
        </div>
    </main>
    <script src="./js/components.js"></script>
</body>

</html>
