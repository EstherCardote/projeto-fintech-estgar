<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Investimento</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex">

    <div id="menu"></div>

    <!-- INICIO DA TELA -->

    <main class="flex-1 ml-20 p-6">
        <div class="max-w-4xl mx-auto p-8">
            <h1 class="text-3xl font-bold text-center text-estgar-roxo-escuro mb-12">Simulador de Investimento</h1>
            <form id="formInvestimento" name="formInvestimento" method="post" action="" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Informações Gerais -->
                    <div>
                        <label for="nomeSimulacao" class="block text-sm font-semibold text-slate-700 mb-2">Nome da
                            Simulação</label>
                        <input type="text" id="nomeSimulacao" name="nomeSimulacao" placeholder="Ex: Aposentadoria"
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>
                    <div>
                        <label for="valorInicial" class="block text-sm font-semibold text-slate-700 mb-2">Valor
                            Inicial</label>
                        <input type="text" id="valorInicial" name="valorInicial" required placeholder="R$ 0,00"
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>
                    <div>
                        <label for="aporteMensal" class="block text-sm font-semibold text-slate-700 mb-2">Aporte
                            Mensal</label>
                        <input type="text" id="aporteMensal" name="aporteMensal" required placeholder="R$ 0,00"
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>

                </div>
            </form>


        </div>

    </main>
    <script src="./js/components.js"></script>
</body>

</html>
