<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejamento</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex">

    <div id="menu"></div>

    <!-- INICIO DA TELA -->

    <main class="flex-1 ml-20 p-6">
        <div class="max-w-4xl mx-auto p-8">
            <h1 class="text-3xl font-bold text-center text-estgar-roxo-escuro mb-12">Planejamento</h1>
            <form id="formPlanejamento" name="formPlanejamento" method="post" action="" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Informações Gerais -->
                    <div>
                        <label for="nomePlanejamento" class="block text-sm font-semibold text-slate-700 mb-2">Nome do
                            Planejamento</label>
                        <input type="text" id="nomePlanejamento" name="nomePlanejamento"
                            placeholder="Ex: Orçamento Trimestral" required class="input-estgar">
                    </div>
                    <div>
                        <label for="limiteGeral" class="block text-sm font-semibold text-slate-700 mb-2">Valor Limite
                            Geral</label>
                        <input type="text" id="limiteGeral" name="limiteGeral" placeholder="R$ 0,00"
                            class="input-estgar">
                    </div>

                    <div>
                        <label for="dataInicio" class="block text-sm font-semibold text-slate-700 mb-2">Data
                            Inicio</label>
                        <input type="date" id="dataInicio" name="dataInicio" required class="input-estgar">
                    </div>
                    <div>
                        <label for="dataFim" class="block text-sm font-semibold text-slate-700 mb-2">Data
                            Fim</label>
                        <input type="date" id="dataFim" name="dataFim" class="input-estgar">
                    </div>

                </div>

                <!-- Limites por Categoria -->
                <div id="containerLimiteCategoria" class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>
                        <label for="limiteCategoria1" class="block text-sm font-semibold text-slate-700 mb-2">Limites
                            por Categoria</label>
                        <select name="limiteCategoria1" id="limiteCategoria1" class="input-estgar">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="alimentação">Alimentação</option>
                            <option value="transporte">Transporte</option>
                            <option value="lazer">Lazer</option>
                        </select>
                    </div>
                    <div>
                        <label for="valor1"
                            class="block text-sm font-semibold text-slate-700 mb-2 opacity-0">Valor</label>
                        <input type="text" id="valor1" name="valorCategoria1" placeholder="R$ 0,00"
                            class="input-estgar">
                    </div>

                    <div>
                        <select name="limiteCategoria2" id="limiteCategoria2" class="input-estgar">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="alimentação">Alimentação</option>
                            <option value="transporte">Transporte</option>
                            <option value="lazer">Lazer</option>
                        </select>
                    </div>
                    <div>
                        <input type="text" id="valor2" name="valorCategoria2" placeholder="R$ 0,00"
                            class="input-estgar">
                    </div>

                    <div>
                        <select name="limiteCategoria3" id="limiteCategoria3" class="input-estgar">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="alimentação">Alimentação</option>
                            <option value="transporte">Transporte</option>
                            <option value="lazer">Lazer</option>
                        </select>
                    </div>
                    <div>
                        <input type="text" id="valor3" name="valorCategoria3" placeholder="R$ 0,00"
                            class="input-estgar">
                    </div>

                </div>
                <!-- BOTÃO DE MAIS CATEGORIAS -->
                <div class="flex justify-start">
                    <button type="button" id="btnAddCategoria" name="btnAddCategoria"
                        class="cursor-pointer w-full md:w-auto px-6 py-3 font-semibold text-estgar-verde hover:shadow-lg border border-estgar-verde rounded-xl transition-all">+
                        Adicionar
                        Categoria</button>
                </div>
                <!-- BOTÕES -->
                <div class="flex flex-col-reverse md:flex-row justify-end gap-4 mt-2">
                    <button type="button" id="btnCancelar" name="btnCancelar"
                        class="cursor-pointer w-full md:w-auto px-6 py-3 font-semibold text-slate-600 hover:shadow-lg border border-estgar-roxo hover:border-gray-400 rounded-xl transition-all">Cancelar
                    </button>
                    <button type="submit" id="btnSalvar" name="btnSalvar"
                        class="cursor-pointer w-full md:w-auto px-10 py-3 bg-estgar-verde-escuro text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all">Salvar
                    </button>

                </div>


            </form>

        </div>



    </main>

    <script src="./js/components.js"></script>

</body>

</html>
