<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Registro de Movimentação</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex">
    <div id="menu"></div>

    <main class="flex-1 ml-20 p-6">
        <div class="max-w-4xl mx-auto p-8">
            <h1 class="page-title">Novo Registro de Movimentação</h1>

            <div class="flex justify-center w-full mb-4">
                <div class="bg-estgar-bege-escuro p-5 rounded-2xl flex gap-3 shadow-sm">
                    <!-- BOTÃO RECEITA (VERDE) -->
                    <button type="button" id="btnReceita" name="btnReceita"
                        class="cursor-pointer px-8 py-3 rounded-xl bg-estgar-verde text-white font-bold hover:shadow-lg transition-all">Receita</button>

                    <!-- BOTÃO DESPESA (ROXO) -->
                    <button type="button" id="btnDespesa" name="btnDespesa"
                        class="cursor-pointer px-8 py-3 rounded-xl bg-estgar-vermelho text-white font-bold hover:shadow-lg transition-all">Despesa</button>

                </div>
            </div>

            <!-- CONTAINER DOS FORMULARIOS -->
            <form id="formRegistroMovimentacao" name="formRegistroMovimentacao" method="post" action=""
                class="space-y-5">

                <!-- FORMULARIOS EM COMUM ENTRE DESPESA E RECEITA -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Data da Movimentação -->
                    <div>
                        <label for="dataMovimentacao" class="label-estgar">Data da
                            Movimentação</label>
                        <input type="date" id="dataMovimentacao" name="dataMovimentacao" required class="input-estgar">
                    </div>

                    <!-- Valor -->
                    <div>
                        <label for="valorMovimentacao" class="label-estgar">Valor</label>
                        <input type="text" id="valorMovimentacao" name="valorMovimentacao" placeholder="R$ 0,00"
                            required class="input-estgar mascara-moeda">
                    </div>

                    <!-- Descrição da Movimentação -->
                    <div>
                        <label for="descricaoMovimentacao" class="label-estgar">Descrição</label>
                        <input type="text" id="descricaoMovimentacao" name="descricaoMovimentacao"
                            placeholder="Ex: Pagamento referente ao projeto XPTO" class="input-estgar">
                    </div>

                    <!-- Categoria da Movimentação -->
                    <div>
                        <label for="categoria" class="label-estgar">Categoria</label>
                        <select id="categoria" name="categoria" required class="input-estgar">
                            <option value="0" disabled selected>Escolha uma opção</option>
                        </select>
                    </div>

                    <!-- Centro de Custo -->
                    <div>
                        <label for="centroCusto" class="label-estgar">Centro de
                            Custo</label>
                        <select id="centroCusto" name="centroCusto"
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="">Centro de Custo cadastrado</option>
                            <option value="">Centro de Custo cadastrado</option>
                            <option value="">Centro de Custo cadastrado</option>
                        </select>
                    </div>

                    <!-- Projeto -->
                    <div>
                        <label for="projeto" class="label-estgar">Projeto</label>
                        <select id="projeto" name="projeto"
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="">Nome do Projeto Cadastrado</option>
                            <option value="">Nome do Projeto Cadastrado</option>
                            <option value="">Nome do Projeto Cadastrado</option>
                        </select>
                    </div>

                    <!-- Observações -->
                    <div>
                        <label for="observacoes" class="label-estgar">Observações</label>
                        <input type="text" id="observacoes" name="observacoes" placeholder="Ex: Salário"
                            class="input-estgar">
                    </div>

                    <!-- Conta de Recebimento -->
                    <div class="campo-receita">
                        <label for="contaRecebimento" class="label-estgar">Conta
                            de
                            Recebimento</label>
                        <select id="contaRecebimento" name="contaRecebimento"
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="">Apelido da conta cadastrada</option>
                            <option value="">Apelido da conta cadastrada</option>
                            <option value="">Apelido da conta cadastrada</option>
                        </select>
                    </div>

                    <!-- Forma de Pagamento -->
                    <div class="campo-despesa">
                        <label for="formaPagamento" class="label-estgar">Forma de
                            Pagamento</label>
                        <select id="formaPagamento" name="formaPagamento" required class="input-estgar">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="boleto">Boleto</option>
                            <option value="credito">Crédito</option>
                            <option value="debito">Débito</option>
                            <option value="dinheiro">Dinheiro</option>
                            <option value="pix">PIX</option>
                            <option value="transferencia">Transferência</option>
                        </select>
                    </div>

                    <!-- Cartão Associado -->
                    <div class="campo-despesa">
                        <label for="cartaoAssociado" class="label-estgar">Cartão
                            Associado</label>
                        <select id="cartaoAssociado" name="cartaoAssociado"
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="">Apelido do cartão cadastrado</option>
                            <option value="">Apelido do cartão cadastrado</option>
                            <option value="">Apelido do cartão cadastrado</option>
                        </select>
                    </div>

                    <!-- Quantidade de Parcelas -->
                    <div class="campo-despesa">
                        <label for="quantidadeParcelas" class="label-estgar">Quantidade
                            de
                            Parcelas</label>
                        <input type="number" id="quantidadeParcelas" name="quantidadeParcelas" placeholder="00" min="0"
                            class="input-estgar">
                    </div>

                    <!-- Data do Vencimento -->
                    <div class="campo-despesa">
                        <label for="dataVencimento" class="label-estgar">Data do
                            Vencimento</label>
                        <input type="date" id="dataVencimento" name="dataVencimento" required class="input-estgar">
                    </div>
                </div>


                <!-- COLUNA DA ESQUERDA: Repetir Mensalmente -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                    <div class="flex items-center gap-3 ">
                        <label for="repetirMensalmente" class="text-sm font-semibold text-slate-700 cursor-pointer">
                            Movimentação recorrente
                        </label>
                        <input type="checkbox" id="repetirMensalmente" name="repetirMensalmente"
                            class="w-5 h-5 rounded border-gray-400 text-estgar-roxo focus:ring-estgar-roxo accent-estgar-roxo cursor-pointer transition-all">
                    </div>

                    <!-- COLUNA DA DIREITA: Anexar Comprovante -->
                    <div class="flex flex-col md:justify-end">
                        <!-- Input verdadeiro, escondido com a classe 'hidden'  -->
                        <input type="file" id="anexoComprovante" name="anexoComprovante" class="hidden"
                            accept="image/*, .pdf">

                        <!-- O Label que funciona como Botão (Conectado ao input pelo 'for' -->
                        <label for="anexoComprovante"
                            class="cursor-pointer flex items-center justify-center gap-3 px-6 py-3 border-2 bg-estgar-bege-escuro border-estgar-roxo text-estgar-roxo font-bold rounded-xl hover:bg-estgar-roxo hover:text-white transition-all w-full md:w-auto"><svg
                                xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                            </svg> Anexar Comprovante</label>
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex flex-col-reverse md:flex-row justify-end gap-4 mt-8">
                    <button type="button" id="btnCancelar" name="btnCancelar" class="btn-secondary">Cancelar
                    </button>
                    <button type="submit" id="btnSalvar" name="btnSalvar" class="btn-primary">Salvar
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script src="./js/script.js"></script>
    <script src="./js/menu.js"></script>
</body>

</html>
