<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Cartão</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex">
    <nav
        class="fixed left-0 top-0 h-full bg-estgar-roxo w-20 hover:w-64 transition-all duration-300 z-50 group flex flex-col py-8 shadow-xl overflow-x-hidden">

        <div class="mb-12 flex justify-start items-center w-full px-6 min-h-10">

            <img src="./assets/images/LOGO SOZINHO-BRANCO-SEM FUNDO.png" alt="Icone Estgar"
                class="h-8 object-contain block group-hover:hidden transition-opacity">

            <img src="./assets/images/LOGO-INTEIRO-BRANCO SEM FUNDO.png" alt="Icone Logo + Estgar"
                class="h-8 w-auto object-contain hidden group-hover:block transition-opacity">
        </div>

        <div class="w-full flex flex-col gap-2 px-4 mt-8">
            <a href="#"
                class="flex items-center gap-4 px-3 py-3 text-white hover:bg-white/30 hover:text-slate-900 rounded-xl transition-all">
                <span class="text-2xl min-w-8 flex justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="24"
                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house-icon lucide-house">
                        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                        <path
                            d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    </svg></span>
                <span
                    class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 font-bold whitespace-nowrap">Inicio</span>
            </a>
            <a href="#"
                class="flex items-center gap-4 px-3 py-3 text-white hover:bg-white/30 hover:text-slate-900 rounded-xl transition-all">
                <span class="text-2xl min-w-8 flex justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-credit-card-icon lucide-credit-card"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg></span>
                <span
                    class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 font-bold whitespace-nowrap">Cartões</span>
            </a>
            <a href=""></a>
        </div>

        </div>
    </nav>
    <main class="flex-1 ml-20 p-8">
        <div class="max-w-4xl mx-auto p-8">
            <h1 class="text-3xl font-bold text-center text-estgar-roxo mb-8">Cadastrar Novo Cartão</h1>
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Apelido do Cartão -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Apelido do Cartão</label>
                        <input type="text" placeholder="Ex: Cartão de Crédito"
                            class="w-full p-3 border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>
                    <!-- Bandeira do Cartão -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Bandeira</label>
                        <select
                            class="w-full p-3 border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                            <option>Mastercard</option>
                            <option>Visa</option>
                            <option>Elo</option>
                        </select>
                    </div>
                </div>

                <!-- Vencimento e Limite -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Vencimento do Cartão -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Vencimento do Cartão</label>
                        <input type="text" placeholder="MM/AA"
                            class="w-full p-3 border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>
                    <!-- Limite de crédito -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Limite de Crédito</label>
                        <input type="text" placeholder="R$ 0,00"
                            class="w-full p-3 border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>
                </div>

                <!--Melhor Dia e Vencimento da Fatura-->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Melhor dia de Compra -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Melhor dia de Compra</label>
                        <input type="number" placeholder="00"
                            class="w-full p-3 border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>

                    <!-- Dia de Vencimento da Fatura -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Dia de Vencimento da
                            Fatura</label>
                        <input type="number" placeholder="00"
                            class="w-full p-3 border border-gray-400 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-700">
                    </div>
                </div>
                <!-- Ativar como cartão principal -->
                <div
                    class="bg-estgar-bege-escuro p-3 rounded-xl border border-gray-400 flex items-center justify-between mt-4">
                    <div>
                        <span class="block text-base font-bold text-slate-800">Ativar como Cartão Principal</span>
                        <span class="text-sm text-slate-500 mt-1 block">Definir este cartão como principal para
                            gastos?</span>
                    </div>
                    <div>
                        <input type="checkbox" class="w-6 h-6 accent-estgar-roxo cursor-pointer">
                    </div>
                </div>
                <!-- Botões -->
                <div class="flex flex-col-reverse md:flex-row justify-end gap-4 mt-8">
                    <button type="button"
                        class="w-full md:w-auto px-6 py-3 font-semibold text-slate-600 hover:bg-opacity-90 hover:shadow-lg border border-estgar-roxo hover:border-gray-400 rounded-xl transition-all ">Cancelar
                    </button>
                    <button type="submit"
                        class="w-full md:w-auto px-8 py-3 bg-estgar-verde text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all">Salvar
                        Cartão</button>

                </div>
            </form>
        </div>
    </main>
</body>

</html>
