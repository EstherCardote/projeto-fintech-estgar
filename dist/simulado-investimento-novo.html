<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Investimento</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex">

    <div id="menu"></div>

    <!-- INICIO DA TELA -->

    <main class="flex-1 ml-20 p-6">
        <div class="max-w-4xl mx-auto p-8">
            <h1 class="page-title">Simulador de Investimento</h1>
            <form id="formInvestimento" name="formInvestimento" method="post" action="" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Informações Gerais -->
                    <div>
                        <label for="nomeSimulacao" class="label-estgar">Nome da
                            Simulação</label>
                        <input type="text" id="nomeSimulacao" name="nomeSimulacao" required
                            placeholder="Ex: Aposentadoria" class="input-estgar">
                    </div>
                    <div>
                        <label for="valorInicial" class="label-estgar">Valor
                            Inicial</label>
                        <input type="text" id="valorInicial" name="valorInicial" required placeholder="R$ 0,00"
                            class="input-estgar">
                    </div>
                    <div>
                        <label for="aporteMensal" class="label-estgar">Aporte
                            Mensal</label>
                        <input type="text" id="aporteMensal" name="aporteMensal" required placeholder="R$ 0,00"
                            class="input-estgar">
                    </div>
                    <div>
                        <label for="prazoInvestimento" class="label-estgar">Prazo</label>
                        <input type="number" id="prazoInvestimento" name="prazoInvestimento" required
                            placeholder="Ex: 90" min="1" class="input-estgar">
                    </div>
                    <div>
                        <label for="taxaRendimento" class="label-estgar">Taxa de
                            Rendimento (%)</label>
                        <input type="number" id="taxaRendimento" name="taxaRendimento" required placeholder="Ex: 100"
                            min="1" class="input-estgar">
                    </div>
                    <div>
                        <label for="tipoTaxa" class="label-estgar">Tipo de
                            Taxa</label>
                        <select name="tipoTaxa" id="tipoTaxa" required class="input-estgar">
                            <option value="" selected disabled>Escolha uma opção</option>
                            <option value="mensal">Mensal</option>
                            <option value="anual">Anual</option>
                        </select>
                    </div>
                    <div>
                        <label for="perfilInvestidor" class="label-estgar">Perfil do
                            Investimento</label>
                        <select name="perfilInvestidor" id="perfilInvestidor" class="input-estgar">
                            <option value="0" disabled selected>Escolha uma opção</option>
                            <option value="conservador">Conservador</option>
                            <option value="moderado">Moderado</option>
                            <option value="arrojado">Arrojado</option>
                        </select>
                    </div>
                    <div>
                        <label for="observacoes" class="label-estgar">Observações</label>
                        <input type="text" id="observacoes" name="observacoes" placeholder="Ex: Salário"
                            class="input-estgar">
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex flex-col-reverse md:flex-row justify-end gap-4 mt-8">
                    <button type="reset" id="btnLimpar" name="btnLimpar" class="btn-secondary">Limpar
                    </button>
                    <button type="submit" id="btnSimular" name="btnSimular"
                        class="btn-primary">Simular
                    </button>
            </form>
        </div>

        <!-- CARD RESULTADO DA SIMULAÇÃO -->
        <div id="resultadoSimulacao" class="hidden mt-10 bg-estgar-cinza-100 rounded-2xl shadow-lg p-8">
            <h2 class="text-2xl font-bold text-center text-estgar-azul mb-6">Resultado da Simulação</h2>

            <div class="flex justify-between">
                <span>Valor investido</span>
                <strong id="valorInvestido">R$ 0,00</strong>
            </div>
            <div class="flex justify-between">
                <span>Rendimento</span>
                <strong id="rendimento">R$ 0,00</strong>
            </div>
            <hr class="mt-2">
            <div class="flex justify-between text-xl pt-2">
                <span>Patrimônio Final</span>
                <strong id="patrimonioFinal">R$ 0,00</strong>
            </div>
        </div>

        <!-- BOTÃO DE SALVAR SIMULAÇÃO -->
        <div id="acoesSimulacao" class="hidden mt-8 flex justify-end">
            <button type="button" id="btnSalvarSimulacao"
                class="cursor-pointer px-8 py-3 bg-estgar-roxo text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all ">Salvar
                Simulação</button>
        </div>

    </main>
    <script src="./js/menu.js"></script>
    <script src="./js/simulador.js"></script>
</body>

</html>
