<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <!-- A linha abaixo Diz ao celular para não diminuir o site para caber na tela, mas sim usar a largura real do aparelho e o zoom em 100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estgar - Gestão Financeira</title>

    <!-- Link para o CSS gerado pelo Tailwind -->
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex items-center justify-center p-4">
    <main
        class="bg-white w-full max-w-6xl rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.1)] flex overflow-hidden min-h-150">

        <section class="hidden md:block w-1/2 relative">
            <img src="./assets/images/imagem-login.png" alt="Ilustração Estgar"
                class="absolute inset-0 w-full h-full object-cover object-center">
        </section>

        <section class="bg-estgar-bege w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center items-center">
            <div class="w-full max-w-sm">

                <!--LOGO IMAGEM EXCLUSIVA PARA MOBILE -->
                <!-- A classe md:hidden esconde no computador -->
                <div class="flex md:hidden justify-center mb-8">
                    <img src="./assets/images/LOGO COLORIDO-SEM FUNDO MENOR.png" alt="Logo Estgar"
                        class="h-16 w-auto object-contain">
                </div>

                <h2 class="text-3xl text-center font-bold text-estgar-roxo mb-8">Bem-vindo de volta</h2>
                <form id="formLogin" name="formLogin" method="post" action="" class="space-y-5">

                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">E-mail</label>
                        <input type="email" id="email" name="email" required
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:ring-1 focus:ring-estgar-roxo transition-all outline-none">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
                        <input type="password" id="password" name="password" required
                            class="w-full p-3 bg-white border border-gray-400 rounded-xl focus:outline-none focus:ring-1 focus:ring-estgar-roxo transition-all outline-none">

                        <div class="flex justify-end mt-2">
                            <a href="#"
                                class="text-sm text-gray-500 font-medium hover:text-estgar-roxo hover:underline transition-colors">Esqueceu
                                a senha?</a>
                        </div>
                    </div>
                    <button type="submit" id="btnEntrar" name="btnEntrar"
                        class="w-full bg-estgar-verde text-white font-bold text-lg py-3.5 rounded-xl hover:opacity-90 active:scale-[0.98] transition-all shadow-sm mt-6">Entrar</button>
                </form>

                <div class="flex items-center my-6 w-full">
                    <div class="grow h-px bg-gray-300"></div>
                    <span class="px-4 text-sm text-gray-400 font-medium">ou</span>
                    <div class="grow h-px bg-gray-300"></div>
                </div>

                <div class="flex justify-center items-center gap-4">

                    <button type="button" aria-label="Entrar com Google"
                        class="w-14 h-14 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-100 hover:scale-105 transition-all shadow-sm">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                    </button>

                    <button type="button" aria-label="Entrar com Apple"
                        class="w-14 h-14 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-100 hover:scale-105 transition-all shadow-sm">
                        <svg class="w-6 h-6 text-black" viewBox="0 0 384 512" fill="currentColor"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
                        </svg>
                    </button>
                </div>

                <p class="text-center mt-8 text-sm text-slate-600">Não tem uma conta?
                    <a href="cadastro.html" class="text-estgar-roxo font-bold hover:underline">Cadastre-se</a>
                </p>
            </div>
        </section>

    </main>

</body>

</html>
